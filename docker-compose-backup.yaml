services:
  web:
    image: schemerpipe
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    ports:
      - "9002:9002"
    environment:
      - PORT=9002
    env_file:
      - .env
  serve:
    image: schemerserver
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "9001:9001"
    environment:
      - PORT=9001
    env_file:
      - .env
  client:
    image: saralsewa
    build:
      context: ./saral-sewa
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    environment:
      - PORT=9000
